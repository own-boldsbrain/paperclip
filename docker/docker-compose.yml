services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    # Ports removed because Traefik will route traffic internally
    # ports:
    #   - "3100:3100"
    environment:
      # Use the shared Postgres database (assuming ysh-postgres-shared is available on ysh-network)
      DATABASE_URL: postgres://paperclip:paperclip@ysh-postgres-shared:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://paperclip.local}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # Integrate with the central LiteLLM AI Gateway
      OPENAI_BASE_URL: "http://ysh-litellm-gateway:4000"
    volumes:
      - paperclip-data:/paperclip
    networks:
      - ysh-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperclip.rule=Host(`paperclip.local`)"
      - "traefik.http.routers.paperclip.entrypoints=web"
      - "traefik.http.services.paperclip.loadbalancer.server.port=3100"

volumes:
  paperclip-data:

networks:
  ysh-network:
    external: true
    name: ysh-network
